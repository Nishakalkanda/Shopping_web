<!DOCTYPE html>
<html>
<head>
    <title>Products</title>

    <a href="{% url 'cart' %}">Cart || </a>
    <a href="{% url 'wishlist' %}">wishlist</a>


    <form method="GET">
    <input
        type="text"
        name="q"
        placeholder="Search products..."
    >

    <button type="submit">
        Search
    </button>
</form>

    <style>
        .container{
            display:flex;
            flex-wrap:wrap;
            gap:20px;
            padding:20px;
        }

        .card{
            width:250px;
            border:1px solid #ddd;
            border-radius:10px;
            padding:15px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        .card img{
            width:100%;
            height:250px;
            object-fit:cover;
        }

        .price{
            color:green;
            font-weight:bold;
        }

        button{
            background:#007bff;
            color:white;
            border:none;
            padding:10px;
            border-radius:5px;
            cursor:pointer;
        }
    </style>

</head>
<body>

<h1>Products</h1>

<div class="container">

{% for product in products %}

<div class="card">
    <a href="{% url 'product_detail' product.id %}"> <img src="{{ product.image.url }}" alt="{{ product.name }}"></a>
   
    <h3>{{ product.name }}</h3>

    <p class="price">₹ {{ product.price }}</p>

</div>

{% endfor %}

</div>

</body>
</html>
